
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KUBERA 💰 WARHUNT</title>
<link rel="stylesheet" href="styles.css">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a1128">
</head>

<body>
<div id="app-container">

<header class="top-header gold-border">
<div class="header-top">
<div class="header-left">
<h1>KUBERA 💰 WARHUNT</h1>
<span class="version">V1 Final</span>
</div>
<div class="header-right gradient-box">
Start ₹<span id="start-bankroll">30000</span>
</div>
</div>

<div class="header-center">
<h2>LIVE AXYAPATRA</h2>
<div class="live-bankroll glow-text">₹<span id="live-bankroll">30000</span></div>
</div>
</header>

<section id="sangram" class="screen active">

<div class="keypads-container">
<div class="keypad-panel gold-border">
<h3>YAKSHA</h3>
<div class="grid-keypad">
<button class="num-btn" data-side="Y" data-val="1">1</button><button class="num-btn" data-side="Y" data-val="2">2</button><button class="num-btn" data-side="Y" data-val="3">3</button><button class="num-btn" data-side="Y" data-val="4">4</button><button class="num-btn" data-side="Y" data-val="5">5</button><button class="num-btn" data-side="Y" data-val="6">6</button><button class="num-btn" data-side="Y" data-val="7">7</button><button class="num-btn" data-side="Y" data-val="8">8</button><button class="num-btn" data-side="Y" data-val="9">9</button>
<button class="num-btn" data-side="Y" data-val="0">0</button>
</div>
</div>

<div class="keypad-panel gold-border">
<h3>KINNARA</h3>
<div class="grid-keypad">
<button class="num-btn" data-side="K" data-val="1">1</button><button class="num-btn" data-side="K" data-val="2">2</button><button class="num-btn" data-side="K" data-val="3">3</button><button class="num-btn" data-side="K" data-val="4">4</button><button class="num-btn" data-side="K" data-val="5">5</button><button class="num-btn" data-side="K" data-val="6">6</button><button class="num-btn" data-side="K" data-val="7">7</button><button class="num-btn" data-side="K" data-val="8">8</button><button class="num-btn" data-side="K" data-val="9">9</button>
<button class="num-btn" data-side="K" data-val="0">0</button>
</div>
</div>
</div>

<div class="ykt-panel gold-border">
<div class="ykt-row" id="y-plan">Y <span class="content">--</span></div>
<div class="ykt-row" id="k-plan">K <span class="content">--</span></div>
<div class="ykt-row" id="t-plan">T <span class="content">0</span></div>
</div>

<div class="controls-panel">
<button id="btn-undo" class="action-btn">Undo</button>
<button id="btn-clear" class="action-btn">Clear</button>
<button id="btn-new" class="action-btn">New</button>
</div>

<div class="chakra-panel gold-border">
<h3>CHAKRA PANEL</h3>
<div id="chakra-display">Round: <span id="current-chakra">1</span></div>
</div>

</section>

<section id="vyuha" class="screen">
<h2 class="screen-title">VYUHA GRID</h2>
<div class="vyuha-grids">
<div class="v-grid-container gold-border">
<h3>YAKSHA</h3>
<div class="vyuha-grid" id="vyuha-y"></div>
</div>
<div class="v-grid-container gold-border">
<h3>KINNARA</h3>
<div class="vyuha-grid" id="vyuha-k"></div>
</div>
</div>
</section>

<section id="granth" class="screen">
<h2 class="screen-title">GRANTH HISTORY</h2>
<table id="history-table">
<thead>
<tr>
<th>Chakra</th>
<th>Yaksha</th>
<th>Kinnara</th>
<th>Bet</th>
<th>Axyapatra</th>
</tr>
</thead>
<tbody id="history-body"></tbody>
</table>
</section>

<section id="drishti" class="screen">
<h2 class="screen-title">DRISHTI</h2>
<div>Rounds <span id="stat-rounds">0</span></div>
<div>Total Bets <span id="stat-bets">0</span></div>
<div>Profit <span id="stat-profit">0</span></div>
<div>Exposure <span id="stat-exposure">0</span></div>
</section>

<section id="sopana" class="screen">
<h2 class="screen-title">SOPANA</h2>
<table>
<thead>
<tr><th>Step</th><th>Bet</th></tr>
</thead>
<tbody id="ladder-body"></tbody>
</table>
</section>

<nav class="bottom-nav">
<button class="nav-btn active" data-target="sangram">⚔️<span>Sangram</span></button>
<button class="nav-btn" data-target="vyuha">🛡️<span>Vyuha</span></button>
<button class="nav-btn" data-target="granth">📜<span>Granth</span></button>
<button class="nav-btn" data-target="drishti">👁️<span>Drishti</span></button>
<button class="nav-btn" data-target="sopana">🪜<span>Sopana</span></button>
</nav>

</div>
<script src="app.js"></script>
</body>
</html>
