<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kubera</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="styles.css">
<meta name="theme-color" content="#1a1a2e">
</head>
<body>

<header class="top">
<h1>Kubera</h1>
<div class="balance">Axyapatra: <span id="balance-value">₹0</span></div>
</header>

<div class="keypads">

<div class="panel">
<h3>Yaksha</h3>
<div class="grid" id="panel-yaksha">
<button class="num-btn">1</button>
<button class="num-btn">2</button>
<button class="num-btn">3</button>
<button class="num-btn">4</button>
<button class="num-btn">5</button>
<button class="num-btn">6</button>
<button class="num-btn">7</button>
<button class="num-btn">8</button>
<button class="num-btn">9</button>
<button class="num-btn zero">0</button>
</div>
</div>

<div class="panel">
<h3>Kinnara</h3>
<div class="grid" id="panel-kinnara">
<button class="num-btn">1</button>
<button class="num-btn">2</button>
<button class="num-btn">3</button>
<button class="num-btn">4</button>
<button class="num-btn">5</button>
<button class="num-btn">6</button>
<button class="num-btn">7</button>
<button class="num-btn">8</button>
<button class="num-btn">9</button>
<button class="num-btn zero">0</button>
</div>
</div>

</div>

<div class="panel next">
<div>Y: <span id="next-y">-</span></div>
<div>K: <span id="next-k">-</span></div>
<div>T: <span id="next-t">0</span></div>
</div>

<script src="app.js"></script>
</body>
</html>
