<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Kubera Warhunt — V1 Treasury Cave</title>
  <meta name="theme-color" content="#120a05">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="kubera_keyglow_patch.css">
</head>
<body>
  <div id="toastLayer" class="toast-layer" aria-live="polite" aria-atomic="true"></div>

  <div id="app">
    <header class="fixed-shell">
      <div class="topbar">
        <div>
          <div class="brand">KUBERA WARHUNT</div>
          <div id="screenTitle" class="screen-title">⚔ SANGRAM</div>
        </div>
        <button id="installBtn" class="install-btn hidden" type="button">Install</button>
      </div>
      <section class="card glow bankroll-card">
        <div class="label">AXYAPATRA</div>
        <div id="bankValue" class="bank">₹ 30,000</div>
      </section>
    </header>

    <main class="content-pad">
      <section id="screen-sangram" class="screen active">
        <section class="boards-compact">
          <div class="board-block">
            <div class="board-title">Y</div>
            <div id="boardY" class="treasure-grid compact"></div>
          </div>
          <div class="board-block">
            <div class="board-title">K</div>
            <div id="boardK" class="treasure-grid compact"></div>
          </div>
        </section>

        <section class="card compact-card">
          <div class="label">NEXT ĀHUTI</div>
          <div id="nextY" class="ahuti-row">Y -</div>
          <div id="nextK" class="ahuti-row">K -</div>
          <div id="nextT" class="total">T 0</div>
        </section>

        <section class="card compact-card">
          <div class="chakra-line">
            <div>
              <div class="label">CHAKRA</div>
              <div id="chakraValue" class="chakra-value">Round : 0</div>
            </div>
            <div class="controls compact-controls">
              <button id="undoBtn" type="button">Undo</button>
              <button id="kumbhaBtn" class="warn" type="button">Kumbha</button>
              <button id="prayogaBtn" type="button">Prayoga</button>
            </div>
          </div>
        </section>
      </section>

      <section id="screen-vyuha" class="screen">
        <div class="split-grid">
          <section class="card"><div class="label">YAKSHA</div><div id="vyuhaY" class="state-grid"></div></section>
          <section class="card"><div class="label">KINNARA</div><div id="vyuhaK" class="state-grid"></div></section>
        </div>
      </section>

      <section id="screen-granth" class="screen">
        <section class="card">
          <div class="toolbar">
            <div class="label">GRANTH</div>
            <div class="btn-row">
              <button id="exportGranthBtn" type="button">Export</button>
              <button id="importGranthBtn" type="button">Load</button>
              <button id="deleteGranthBtn" class="warn" type="button">Delete</button>
              <input id="importGranthFile" type="file" accept="application/json" hidden>
            </div>
          </div>
          <div id="granthList" class="granth-list"></div>
        </section>
      </section>

      <section id="screen-drishti" class="screen">
        <section class="summary-grid">
          <div class="card stat"><div class="label">Chakras Played</div><div id="sumChakras" class="stat-value">0</div></div>
          <div class="card stat"><div class="label">Total Āhuti</div><div id="sumAhuti" class="stat-value">0</div></div>
          <div class="card stat"><div class="label">Net Profit</div><div id="sumProfit" class="stat-value">0</div></div>
          <div class="card stat"><div class="label">Max Exposure</div><div id="sumExposure" class="stat-value">0</div></div>
        </section>
        <section class="card">
          <div class="toolbar">
            <div class="label">NUMBER PERFORMANCE</div>
            <div class="btn-row">
              <button id="exportCsvBtn" type="button">Export CSV</button>
              <button id="loadCsvBtn" type="button">Load CSV</button>
              <input id="loadCsvFile" type="file" accept=".csv,text/csv" hidden>
            </div>
          </div>
          <div class="table-wrap"><table id="drishtiTable"><thead><tr><th>Side</th><th>No</th><th>Act</th><th>Win</th><th>Steps</th><th>Prev Loss</th><th>Win Bet</th><th>Net P/L</th><th>Status</th></tr></thead><tbody></tbody></table></div>
        </section>
      </section>

      <section id="screen-sopana" class="screen">
        <section class="card">
          <div class="toolbar">
            <div class="label">SOPANA</div>
            <div class="btn-row">
              <button id="saveLadderBtn" type="button">Save</button>
              <button id="resetLadderBtn" type="button">Reset</button>
            </div>
          </div>
          <div class="table-wrap"><table id="ladderTable"><thead><tr><th>Step</th><th>Bet</th><th>Win Return</th><th>Net Profit</th><th>If Lose Total</th></tr></thead><tbody></tbody></table></div>
        </section>
      </section>

      <section id="screen-yantra" class="screen">
        <section class="card yantra-card">
          <div class="label">YANTRA</div>
          <div class="settings-grid">
            <label><span>Axyapatra</span><input id="setBankroll" type="number"></label>
            <label><span>Target $</span><input id="setTargetDollar" type="number"></label>
            <label><span>Target %</span><input id="setTargetPercent" type="number" step="0.01"></label>
            <label><span>Stop Loss</span><input id="setStopLoss" type="number"></label>
            <label><span>Min</span><input id="setMin" type="number"></label>
            <label><span>Max</span><input id="setMax" type="number"></label>
            <label><span>Coin Size</span><select id="setCoin"><option>100</option><option>500</option><option>1000</option><option>5000</option><option>10000</option></select></label>
            <label><span>Target / Number</span><input id="setTargetNum" type="number"></label>
            <label><span>Keypad Mode</span><select id="setKeypadMode"><option value="combined">Combined</option><option value="individual">Individual</option></select></label>
            <label><span>Max Steps</span><input id="setMaxSteps" type="number"></label>
            <label><span>Safety Reserve</span><input id="setReserve" type="number"></label>
            <label><span>CAP Rule</span><select id="setCapRule"><option value="on">ON</option><option value="off">OFF</option></select></label>
          </div>
          <div class="save-wrap"><button id="applyYantraBtn" type="button">APPLY YANTRA</button></div>
        </section>
      </section>

      <section id="screen-medha" class="screen">
        <section class="card">
          <div class="label">MEDHA</div>
          <div id="medhaPanel" class="medha-panel"></div>
        </section>
      </section>
    </main>

    <nav class="bottom-nav">
      <button class="nav active" data-target="sangram" type="button">⚔<span>Sangram</span></button>
      <button class="nav" data-target="vyuha" type="button">🛡<span>Vyuha</span></button>
      <button class="nav" data-target="granth" type="button">📜<span>Granth</span></button>
      <button class="nav" data-target="drishti" type="button">👁<span>Drishti</span></button>
      <button class="nav" data-target="sopana" type="button">🪜<span>Sopana</span></button>
      <button class="nav" data-target="yantra" type="button">⚙<span>Yantra</span></button>
      <button class="nav" data-target="medha" type="button">🧠<span>Medha</span></button>
    </nav>
  </div>
  <script src="app.js"></script>
</body>
</html>
